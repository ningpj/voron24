
##########################################################################################
# The servo hardware configuration. Change the values to your needs.
# 
;[mmu_servo blobifier]
# Pin for the servo.
;pin: PA3 
# Adjust this value until a 'BLOBIFIER_SERVO POS=in' retracts the tray fully without a 
# buzzing sound
;minimum_pulse_width: 0.00050 ; gao a0090
# Adjust this value until a 'BLOBIFIER_SERVO POS=out' extends the tray fully without a 
# buzzing sound
;maximum_pulse_width: 0.0025 ; gao a0090
# Leave this value at 180
;maximum_servo_angle: 180

##########################################################################################
# Stepper-based tray actuator
#
[manual_stepper stepper_blobifier]
step_pin: PE1                            
dir_pin: !PE0
enable_pin: !PC5 
endstop_pin: ^PB14
microsteps: 4
gear_ratio: 1:1
rotation_distance: 62.83
position_min: 0 # Not supported in Kalico. Leave disabled
position_max: 22 # Not supported in Kalico. Leave disabled.
homing_speed: 30 # Unused in the macros. Just for completeness
velocity: 100
accel: 1000
#
# Uncomment ONE of the TMC driver sections below to match your hardware.
# Only one driver section should be active at a time.
#
[tmc2209 manual_stepper stepper_blobifier]
uart_pin: PD11                          # Update to your UART pin
run_current: 0.4
hold_current: 0.1
interpolate: true
stealthchop_threshold: 99999999
sense_resistor: 0.110

##########################################################################################
# The bucket hardware configuration. Change the pin to whatever pin you've connected the 
# switch to.
# 
[gcode_button bucket]
pin: ^!PA1 # The pullup ( ^ ) is important here.

press_gcode:
  _MSG PREFIX=⏫ MSG="BLOBIFIER: Tray is installed"
release_gcode:
  _MSG PREFIX=⏬ MSG="BLOBIFIER: Tray has been removed"
  _BLOBIFIER_COUNT_RESET

