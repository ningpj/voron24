####################################################################
[gcode_macro CYCLE_MMU] 
#####################################################################

gcode:
  {% if printer.mmu is defined and printer.mmu.enabled %}
    {% if printer.extruder.can_extrude == True %}
       ;MMU_EJECT
       PARKFRONT
       M83      ; relative mode
       {% for gate in range(7, -1, -1) %}
          T{gate}
          G1 E20 F400
          G4 P500
       {% endfor %}
       MMU_UNLOAD
    {% else %}
       M118 WARNING: Hotend cant extrude - Aborted
    {% endif %}
  {% endif %}

